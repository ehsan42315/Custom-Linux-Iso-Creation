# ============================================================
#                KALI PRO – ADVANCED PRESEED
#         For maximum flexibility and rapid deployment
# ============================================================

# ------------------- Locale & Keyboard ----------------------
d-i debian-installer/locale string en_US.UTF-8
d-i debian-installer/language string en
d-i debian-installer/country string US
d-i keyboard-configuration/xkb-keymap select us
d-i console-setup/ask_detect boolean false
d-i console-setup/layoutcode string us

# ------------------- Time & Clock ---------------------------
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

# ------------------- Hostname & Domain ----------------------
d-i netcfg/get_hostname string kali-pro
d-i netcfg/get_domain string local

# ------------------- APT & Repositories ---------------------
# Use the Kali mirror (no CD-ROM)
d-i apt-setup/use_mirror boolean true
d-i apt-setup/cdrom/set-first boolean false
d-i apt-setup/disable-cdrom-entries boolean true
# Enable contrib, non-free, and non-free-firmware
d-i apt-setup/contrib boolean true
d-i apt-setup/non-free boolean true
d-i apt-setup/non-free-firmware boolean true
# Do not enable source repositories
d-i apt-setup/enable-source-repositories boolean false
# Do not install security/updates automatically (we'll handle later)
d-i apt-setup/services-select multiselect
d-i pkgsel/update-policy select none

# ------------------- Disk Partitioning ----------------------
# Use LVM with separate /home, /var, /tmp for flexibility
d-i partman-auto/method string lvm
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-auto/choose_recipe select atomic
# Override to create separate /home, /var, /tmp
d-i partman-auto/expert_recipe string                         \
      boot-root ::                                            \
              40 50 100 ext4                                  \
                      $primary{ } $bootable{ }                \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ /boot }                     \
              .                                               \
              2000 3000 4000 ext4                             \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ / }                         \
              .                                               \
              2000 3000 4000 ext4                             \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ /home }                     \
              .                                               \
              1000 2000 3000 ext4                             \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ /var }                      \
              .                                               \
              500 1000 2000 ext4                              \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ /tmp }                      \
              .                                               \
              100% 100% 100% linux-swap                       \
                      method{ swap } format{ }                \
              .
# Confirm partitioning
d-i partman/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# ------------------- User & Root Accounts -------------------
# Enable root login with a strong password (change it!)
d-i passwd/root-login boolean true
# Use a crypted password – here we set "toor" (SHA-512) – CHANGE THIS!
d-i passwd/root-password-crypted password $6$random_salt$9vYj5C9GXhLqZ1fRq7zA3...

# Create a default user with sudo privileges
d-i passwd/user-fullname string MY_FULLNAME
d-i passwd/username string MY_USERNAME
d-i passwd/user-password-crypted password MY_PASSWORD
# Add user to sudo group (will be enforced in late_command)
d-i passwd/user-default-groups string sudo

# ------------------- GRUB Bootloader ------------------------
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

# ------------------- Late Command (THE MAGIC) ---------------
# This script runs after installation – it:
#   1. Gives the default user NOPASSWD sudo
#   2. Enables SSH and starts it
#   3. Disables the firewall (ufw)
#   4. Sets up auto-login for LightDM (XFCE default)
#   5. Disables IPv6 (optional)
d-i preseed/late_command string \
      in-target bash -c ' \
        USER="MY_USERNAME"; \
        # Grant sudo without password \
        echo "$USER ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/99-$USER; \
        chmod 440 /etc/sudoers.d/99-$USER; \
        # Enable SSH \
        systemctl enable ssh; \
        systemctl start ssh; \
        # Disable firewall \
        ufw disable 2>/dev/null || true; \
        # Auto-login for LightDM (used by XFCE) \
        mkdir -p /etc/lightdm/lightdm.conf.d; \
        echo "[Seat:*]" > /etc/lightdm/lightdm.conf.d/99-autologin.conf; \
        echo "autologin-user=$USER" >> /etc/lightdm/lightdm.conf.d/99-autologin.conf; \
        echo "autologin-user-timeout=0" >> /etc/lightdm/lightdm.conf.d/99-autologin.conf; \
        # Optional: disable IPv6 for speed \
        echo "net.ipv6.conf.all.disable_ipv6=1" >> /etc/sysctl.conf; \
        echo "net.ipv6.conf.default.disable_ipv6=1" >> /etc/sysctl.conf; \
        sysctl -p; \
        # Final cleanup \
        apt-get clean; \
      '

# ------------------- Other Settings -------------------------
# Disable popularity contest
popularity-contest popularity-contest/participate boolean false
# Avoid encfs warnings
encfs encfs/security-information boolean true
encfs encfs/security-information seen true
# Set default console charset
console-setup console-setup/charmap47 select UTF-8
# Install setuid for wireshark
wireshark-common wireshark-common/install-setuid boolean true
# Install setuid for kismet
kismet-capture-common kismet-capture-common/install-setuid boolean true

# ------------------- Speed Up Installation ------------------
# Use eatmydata during install
d-i preseed/early_command string anna-install eatmydata-udeb
